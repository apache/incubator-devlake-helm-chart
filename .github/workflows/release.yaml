name: Release Charts

on:
  push:
    branches:
      - main
      - release-v*
    paths:
      - charts/**
      - "!**.md"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools via mise
        run: mise install

      - name: Add repositories
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a0d2dc62c5e491af8ef6ba64a2e02bcf3fb33aa1 # v1.7.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: false

      - name: Generate SBOM
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.17.2
        continue-on-error: true
        with:
          path: charts/devlake
          format: spdx-json
          output-file: devlake-sbom.spdx.json

      - name: Upload SBOM to release
        continue-on-error: true
        run: |
          if [ -f devlake-sbom.spdx.json ]; then
            for pkg in .cr-release-packages/*; do
              if [ -z "${pkg:-}" ]; then
                break
              fi
              TAG=$(basename "$pkg" | sed 's/.*-\([0-9].*\)\.tgz/\1/')
              gh release upload "devlake-${TAG}" devlake-sbom.spdx.json --clobber || true
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        continue-on-error: true

      - name: Push Chart to GHCR
        run: |
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            helm push "${pkg}" oci://ghcr.io/${{ github.repository }}
          done

      - name: Sign chart with cosign
        continue-on-error: true
        run: |
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            CHART_NAME=$(basename "$pkg" | sed 's/-[0-9].*//')
            TAG=$(basename "$pkg" | sed 's/.*-\([0-9].*\)\.tgz/\1/')
            cosign sign --yes "ghcr.io/${{ github.repository }}/${CHART_NAME}:${TAG}" || true
          done

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c # v1.4.3
        continue-on-error: true
        with:
          subject-path: '.cr-release-packages/*.tgz'
