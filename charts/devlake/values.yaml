# replica count
replicaCount: 1
imageTag: v1.0.3-beta12

# image pull secrets
imagePullSecrets: []

# NetworkPolicy configuration
networkPolicy:
  enabled: false  # Production: set to true. See NOTES.txt for required egress config.
  externalEgressCIDRs: []
  # External database access CIDRs (required when database.useExternal=true and networkPolicy.enabled=true)
  # Example: ["10.0.0.0/8"] or leave empty to allow all destinations (0.0.0.0/0)
  externalDatabaseCIDRs: []
  ui:
    # Restrict UI ingress sources (optional)
    # When not set, UI accepts traffic from all sources
    ingressNamespaceSelector: {}
    ingressPodSelector: {}

# Optional SHA256 digests for image pinning
imageDigests:
  lake: ""
  ui: ""
  grafana: ""
  database:
    mysql: ""
    postgresql: ""

# ServiceAccount configuration for lake, ui, and grafana pods
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template with -sa suffix
  name: ""

#the common environments for all pods except grafana, grafana needs to be set in grafana section seperately
commonEnvs:
  TZ: "UTC"

# BREAKING CHANGE (v2.0.0): mysql.* has been replaced with database.*
# Migration guide: https://github.com/apache/incubator-devlake-helm-chart/blob/main/MIGRATION.md
#
# Old (v1.x):          New (v2.0.0):
# mysql.username    →  database.username
# mysql.password    →  database.password
# mysql.database    →  database.database
# mysql.useExternal →  database.useExternal
# mysql.rootPassword → database.mysql.rootPassword
# mysql.extraParams →  database.mysql.extraParams
#
# You must also add: database.type: mysql (or postgresql)

database:
  # Database type selector - supported: mysql, postgresql
  # REQUIRED FOR POSTGRESQL: Set type to 'postgresql'
  type: mysql

  replicaCount: 1

  # if use external database server, please set true
  # by default using false, chart will create a single database instance
  useExternal: false

  # the external database server address
  externalServer: 127.0.0.1

  # external database port (default: 3306 for mysql, 5432 for postgresql)
  externalPort: 3306

  # the username for devlake database
  username: merico

  # the password for devlake database
  # ⚠️ SECURITY WARNING: Never commit plaintext passwords to Git!
  # For production, use externalSecrets.enabled=true or pass via --set
  # Example: helm install --set database.password=$DB_PASSWORD
  password: ""

  # the database name for devlake
  database: lake

  # storage for database (embedded mode only)
  storage:
    # pvc or hostpath
    type: pvc
    # the storage class for pv, leave empty will using default
    class: ""
    size: 50Gi
    hostPath: /devlake/database/data

  # image for database (embedded mode only)
  # defaults: mysql:8 for type=mysql, postgres:14 for type=postgresql
  # Leave repository and tag empty to use type-driven defaults from _helpers.tpl
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent

  # init containers for database if have
  initContainers: []

  # resources config for database if have
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  # nodeSelector config for database if have
  nodeSelector: {}

  # tolerations config for database if have
  tolerations: []

  # affinity config for database if have
  affinity: {}

  extraLabels: {}

  # Security context (runAsUser and fsGroup are computed based on database.type)
  # mysql: uid=999, postgresql: uid=70
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  podAnnotations: {}

  service:
    type: "ClusterIP"
    nodePort: ""
    loadBalancerIP: ""
    extraLabels: {}

  # MySQL-specific settings (only used when database.type: mysql)
  mysql:
    # root password for mysql, only used when useExternal=false
    rootPassword: ""

    # Enable root initContainer to fix permissions
    # Set to false for Pod Security Standards "restricted" compliance
    # When false, ensure PVC/volume permissions are correct (fsGroup may handle this)
    enableFixPermissions: true

    # extra MySQL DSN query params appended to DB_URL.
    # Note: include a leading '&' yourself. Empty string means no change.
    # example: "&tls=skip-verify" or "&tls=skip-verify&autocommit=true"
    extraParams: ""

  # PostgreSQL-specific settings (only used when database.type: postgresql)
  postgresql:
    # Enable root initContainer to fix permissions
    # Set to false for Pod Security Standards "restricted" compliance
    # When false, ensure PVC/volume permissions are correct (fsGroup may handle this)
    enableFixPermissions: true

    # extra PostgreSQL DSN query params appended to DB_URL.
    # Note: must include a leading '?' for first param. Empty string means no change.
    # example: "?sslmode=disable" or "?sslmode=disable&search_path=public"
    extraParams: ""

# dependency chart values
grafana:
  enabled: true
  #if grafana enabled is false, then external url should be provided
  external:
    url: ""
  image:
    registry: devlake.docker.scarf.sh
    repository: apache/devlake-dashboard
    tag: v1.0.3-beta10
  serviceAccount:
    create: false
    nameOverride: "{{ include \"devlake.serviceAccountName\" . }}"
  deploymentStrategy:
    type: Recreate
  adminPassword: ""
  grafana.ini:
    server:
      serve_from_subpath: "true"
      root_url: "%(protocol)s://%(domain)s/grafana"
  # the Secret name should be the same as .Values.option.connectionSecretName
  envFromSecrets:
    - name: &devlake_db_auth "devlake-db-auth"
  # the ConfigMap name should be the same as .Values.option.connectionConfigmapName
  envFromConfigMaps:
    - name: &devlake_db_auth_config "devlake-db-auth-config"
  #keep grafana timezone same as other pods, which is set by .Values.commonEnvs.TZ
  env:
    TZ: "UTC"
  persistence:
    enabled: true
    size: 4Gi
  ingressServiceName: ""
  ingressServicePort: ""

lake:
  replicaCount: 1
  revisionHistoryLimit: 10
  image:
    repository: devlake.docker.scarf.sh/apache/devlake
    pullPolicy: IfNotPresent
    # defaults to imageTag; if set, lake.image.tag will override imageTag
    # tag:
  # storage for config
  port: 8080
  envs:
    API_TIMEOUT: "120s"
    API_RETRY: "3"
    API_REQUESTS_PER_HOUR: "10000"
    PIPELINE_MAX_PARALLEL: "1"
    IN_SECURE_SKIP_VERIFY: "false"
    LOGGING_DIR: "/app/logs"
    # debug, info, warn, error
    LOGGING_LEVEL: "info"
    LOGGING_FORMAT: json
    JIRA_JQL_AUTO_FULL_REFRESH: "true"
    ##########################
    # ENABLE_SUBTASKS_BY_DEFAULT: This environment variable is used to enable or disable the execution of subtasks.
    # The format is as follows: plugin_name1:subtask_name1:enabled_value,plugin_name2:subtask_name2:enabled_value,plugin_name3:subtask_name3:enabled_value
    ##########################
    # ENABLE_SUBTASKS_BY_DEFAULT default value as below:
    # ENABLE_SUBTASKS_BY_DEFAULT: "jira:collectIssueChangelogs:true,jira:extractIssueChangelogs:true,jira:convertIssueChangelogs:true,tapd:collectBugChangelogs:true,tapd:extractBugChangelogs:true,tapd:convertBugChangelogs:true,zentao:collectBugRepoCommits:true,zentao:extractBugRepoCommits:true,zentao:convertBugRepoCommits:true,zentao:collectStoryRepoCommits:true,zentao:extractStoryRepoCommits:true,zentao:convertStoryRepoCommits:true,zentao:collectTaskRepoCommits:true,zentao:extractTaskRepoCommits:true,zentao:convertTaskRepoCommits:true"

  #extra envs from an existing secret
  extraEnvsFromSecret: ""
  encryptionSecret:
    # The name of secret which contains keys named ENCRYPTION_SECRET
    secretName: ""
    # if secretName is empty, secret should be set
    # ⚠️ SECURITY WARNING: Never commit encryption secrets to Git!
    # For production, use externalSecrets.enabled=true or pass via --set
    # Generate: openssl rand -base64 2000 | tr -dc 'A-Z' | fold -w 128 | head -n 1
    # Example: helm install --set lake.encryptionSecret.secret=$ENCRYPTION_SECRET
    secret: ""
    autoCreateSecret: true

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  strategy:
    type: Recreate

  nodeSelector: {}

  tolerations: []

  affinity: {}

  extraLabels: {}

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  initContainerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  podAnnotations: {}

  initContainers: []

  livenessProbe:
    httpGet:
      path: /ping
      port: 8080
      scheme: HTTP
    failureThreshold: 5
    initialDelaySeconds: 30
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /ping
      port: 8080
      scheme: HTTP
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 5

  deployment:
    extraLabels: {}

  service:
    extraLabels: {}

  # Additional volumes to include in the Pod. Example:
  #
  # volumes:
  #   - name: my-volume
  #     configMap: my-config-map
  volumes: []

  # Additional volume mounts to include in the Container. Example:
  #
  # volumeMounts:
  #   - name: test-volume
  #     mountPath: /opt/test_folder
  #     subPath: test_file.yaml
  volumeMounts: []

  # PodDisruptionBudget for high availability
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # HorizontalPodAutoscaler configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  # Pod Anti-Affinity configuration
  podAntiAffinity:
    enabled: false
    type: preferred

  # Topology spread constraints
  topologySpreadConstraints: []

ui:
  replicaCount: 1
  revisionHistoryLimit: 10
  image:
    repository: devlake.docker.scarf.sh/apache/devlake-config-ui
    pullPolicy: IfNotPresent
    # defaults to imageTag; if set, lake.image.tag will override imageTag
    # tag:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  strategy: {}

  nodeSelector: {}

  tolerations: []

  affinity: {}

  livenessProbe:
    httpGet:
      path: /health/
      port: 4000
      scheme: HTTP
    failureThreshold: 5
    initialDelaySeconds: 15
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /health/
      port: 4000
      scheme: HTTP
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 5

  basicAuth:
    enabled: false
    user: admin
    # ⚠️ SECURITY WARNING: Never commit plaintext passwords to Git!
    # For production, use externalSecrets.enabled=true or pass via --set
    # Example: helm install --set ui.basicAuth.password=$UI_PASSWORD
    password: ""
    autoCreateSecret: true
    secretName: ""

  extraLabels: {}

  podAnnotations: {}

  ## SecurityContext holds pod-level security attributes and common container settings.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  ## K8s containers' Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  deployment:
    extraLabels: {}

  service:
    extraLabels: {}

  ## Side Contaainer Configuration
  extraContainers: []

  # PodDisruptionBudget for high availability
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # HorizontalPodAutoscaler configuration
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  # Pod Anti-Affinity configuration
  podAntiAffinity:
    enabled: false
    type: preferred

  # Topology spread constraints
  topologySpreadConstraints: []
#  - name: vault-agent
#    image: vault:1.6.2
#    args:
#    - agent
#    - -config
#    - /vault/config/config.hcl
#    env:
#    - name: VAULT_ADDR
#      value: https://vault:8200
#    - name: VAULT_SKIP_VERIFY
#      value: "false"
#    - name: VAULT_CACERT
#      value: /vault/tls/ca.crt

# alpine image for some init containers
alpine:
  image:
    repository: alpine
    tag: 3.16
    pullPolicy: IfNotPresent

# Prometheus metrics configuration
metrics:
  enabled: false
  serviceMonitor:
    enabled: false

service:
  # service type: NodePort/ClusterIP
  type: ClusterIP

ingress:
  enabled: false
  enableHttps: false
  # Set to false if you want to use a different ingress controller
  useDefaultNginx: false
  # ingress class name, example: alb for AWS load balancer controller
  className:
  # domain name for hosting devlake, must be set if ingress is enabled
  hostname: localhost
  extraLabels: {}
  # annotations required for your ingress controller; see the examples below
  # for nginx, use the first two lines of annotations
  # for alb (w/ external-dns), use the last 5 (6) lines of annotations
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  #
  # alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
  # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-2:xxx:certificate/xxx-xxx-xxx
  # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
  # alb.ingress.kubernetes.io/scheme: internet-facing
  # alb.ingress.kubernetes.io/target-type: ip
  # external-dns.alpha.kubernetes.io/hostname: www.example.com

  # url prefix, not works right now, keep "/"
  prefix: /
  # if using https provides the certificates secret name
  tlsSecretName: ""
  # ingress http port
  httpPort: 80
  # ingress https port
  httpsPort: 443
  # rate limiting for default nginx ingress controller
  rateLimit: "100"

# Gateway API HTTPRoute configuration
httpRoute:
  enabled: false
  # Gateway name to attach to
  gatewayName: ""
  # Gateway namespace (if different from release namespace)
  gatewayNamespace: ""
  # Listener/section name on the Gateway
  sectionName: ""
  # Hostnames for the HTTPRoute
  hostnames: []
  #  - devlake.example.com
  # Path prefix
  prefix: /
  # Extra labels
  extraLabels: {}
  # Annotations
  annotations: {}

  extraPaths: []
#  extraPaths:
#    - path: /*
#      pathType: ImplementationSpecific
#      backend:
#        service:
#          name: ssl-redirect
#          port:
#            name: use-annotation

option:
  # DEPRECATED (v2.0.0): option.database removed - use database.type instead
  # database type now controlled by database.type field above

  # the existing k8s secret name of db connection auth
  connectionSecretName: *devlake_db_auth
  # Optional: override the ConfigMap name for non-sensitive DB envs used across components
  # Default is a fixed name to align references from subcharts
  connectionConfigmapName: *devlake_db_auth_config
  autoCreateSecret: true
  # If true, the chart assembles DB_URL automatically. Set to false
  # to disable auto-assembly and provide DB_URL yourself via `lake.envs` or
  # an external secret referenced by `lake.extraEnvsFromSecret`.
  assembleDbUrl: true

# External Secrets Operator integration
externalSecrets:
  enabled: false
  secretStoreRef:
    name: ""
    kind: SecretStore
  secretName: ""
  remoteRefs:
    dbPassword: ""
    dbRootPassword: ""
    encryptionSecret: ""
    uiPassword: ""

# Define some extra resources to be created
# This section is useful when you need ExternalResource or Secrets, etc.
extraResources: []
  # - apiVersion: v1
  #   kind: Secret
  #   metadata:
  #     name: example-secret
  #     labels: {}
  #   type: Opaque
  #   stringData:
  #     username: admin
  #     password: mypassword

# Database backup configuration (CronJob)
backup:
  enabled: false
  schedule: "0 2 * * *"  # Daily at 2 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  backoffLimit: 2
  retentionDays: 7
  image:
    # Image for MySQL backups (used when database.type=mysql)
    repository: mysql
    tag: "8"
    # Image tag for PostgreSQL backups (used when database.type=postgresql)
    # Uses postgres:<postgresTag>
    postgresTag: "14"
    pullPolicy: IfNotPresent
  pvc:
    # Use existing PVC (leave empty to create new PVC with name: <fullname>-backup)
    existingClaim: ""
    # Storage class for backup PVC (leave empty for default)
    storageClassName: ""
    # Storage size for backup PVC
    size: 10Gi
