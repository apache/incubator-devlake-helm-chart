---
# PostgreSQL database statefulset
{{- if eq .Values.database.type "postgresql" }}
{{- if not .Values.database.useExternal }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devlake.fullname" . }}-postgresql
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
spec:
  replicas: {{ if gt (int .Values.database.replicaCount) 1 }}1{{ else }}{{ .Values.database.replicaCount }}{{ end }}
  serviceName: {{ include "devlake.fullname" . }}-postgresql
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "devlake.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "devlake.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        devlakeComponent: postgresql
        {{- with .Values.database.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- toYaml .Values.database.podAnnotations | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.database.securityContext.runAsNonRoot }}
        runAsUser: {{ include "database.uid" . }}
        fsGroup: {{ include "database.uid" . }}
        seccompProfile:
          type: {{ .Values.database.securityContext.seccompProfile.type }}
      initContainers:
        - name: fix-permissions
          image: {{ include "database.image" . }}
          command: ['sh', '-c']
          args:
            - |
              chown -R 70:70 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
      {{- with .Values.database.initContainers}}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: {{ include "database.image" . }}
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          {{- with .Values.database.postgresql.extraArgs }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER
            periodSeconds: 5
            failureThreshold: 3
          {{- with .Values.database.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "devlake.db.configmap" . }}
            - secretRef:
                name: {{ include "devlake.db.secret" . }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devlake.db.configmap" . }}
                  key: DB_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devlake.db.configmap" . }}
                  key: DB_DATABASE
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devlake.db.secret" . }}
                  key: DB_PASSWORD
            {{- range $key, $value := .Values.commonEnvs }}
            - name: "{{ tpl $key $ }}"
              value: "{{ tpl (print $value) $ }}"
            {{- end }}
          volumeMounts:
            - mountPath: /var/lib/postgresql
              name: pgdata-parent
            {{- if or (eq .Values.database.storage.type "pvc") (eq .Values.database.storage.type "hostpath") }}
            - mountPath: /var/lib/postgresql/data
              name: data
            {{- end }}
            - mountPath: /var/run/postgresql
              name: run
            - mountPath: /tmp
              name: tmp
          securityContext:
            runAsNonRoot: {{ .Values.database.containerSecurityContext.runAsNonRoot }}
            runAsUser: {{ include "database.uid" . }}
            readOnlyRootFilesystem: {{ .Values.database.containerSecurityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.database.containerSecurityContext.allowPrivilegeEscalation }}
            capabilities:
              drop: {{ toYaml .Values.database.containerSecurityContext.capabilities.drop | nindent 16 }}
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
      {{- with .Values.database.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.database.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.database.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if eq .Values.database.storage.type "hostpath" }}
        - name: data
          hostPath:
            path: {{ .Values.database.storage.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
        - name: pgdata-parent
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  {{- if eq .Values.database.storage.type "pvc" }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.database.storage.class }}
        storageClassName: "{{ . }}"
        {{- end }}
        resources:
          requests:
            storage: "{{ .Values.database.storage.size }}"
  {{- end }}
{{- end }}
{{- end }}
