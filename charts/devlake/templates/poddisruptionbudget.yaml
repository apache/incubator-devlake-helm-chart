{{- if .Values.lake.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "devlake.fullname" . }}-lake
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
spec:
  {{- include "devlake.podDisruptionBudget" (dict "pdb" .Values.lake.podDisruptionBudget "replicaCount" .Values.lake.replicaCount) | nindent 2 }}
  selector:
    matchLabels:
      {{- include "devlake.selectorLabels" . | nindent 6 }}
      devlakeComponent: lake
{{- end }}
{{- if .Values.ui.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "devlake.fullname" . }}-ui
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
spec:
  {{- include "devlake.podDisruptionBudget" (dict "pdb" .Values.ui.podDisruptionBudget "replicaCount" .Values.ui.replicaCount) | nindent 2 }}
  selector:
    matchLabels:
      {{- include "devlake.selectorLabels" . | nindent 6 }}
      devlakeComponent: ui
{{- end }}
