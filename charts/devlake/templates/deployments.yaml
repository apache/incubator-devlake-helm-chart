---
# devlake-ui
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devlake.fullname" . }}-ui
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
    {{- with .Values.ui.deployment.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  revisionHistoryLimit: {{ .Values.ui.revisionHistoryLimit }}
  {{- with .Values.ui.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "devlake.selectorLabels" . | nindent 6 }}
      devlakeComponent: ui
  template:
    metadata:
      labels:
        {{- include "devlake.selectorLabels" . | nindent 8 }}
        devlakeComponent: ui
        {{- with .Values.ui.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- toYaml .Values.ui.podAnnotations | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "devlake.serviceAccountName" . }}
      {{- with .Values.ui.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "devlake.podAntiAffinity" (dict "enabled" .Values.ui.podAntiAffinity.enabled "type" .Values.ui.podAntiAffinity.type "componentName" "ui" "root" .) | nindent 6 }}
      {{- with .Values.ui.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      {{- with .Values.ui.extraContainers }}
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
        - name: config-ui
          image: {{ include "devlake.ui.image" . }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 4000
          {{- with .Values.ui.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ui.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.ui.basicAuth.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "devlake.ui.auth.secret" . }}
          {{- end }}
          env:
            - name: DEVLAKE_ENDPOINT
              value: {{ include "devlake.fullname" . }}-lake.{{ .Release.Namespace }}.svc.cluster.local:8080
{{- if not .Values.grafana.enabled }}
            - name: GRAFANA_ENDPOINT
              value: {{ .Values.grafana.external.url }}
            - name: USE_EXTERNAL_GRAFANA
              value: "true"
{{- else }}
            - name: GRAFANA_ENDPOINT
              value: {{ .Release.Name }}-grafana.{{ .Release.Namespace }}.svc.cluster.local:80
{{- end }}
            {{- range $key, $value := .Values.commonEnvs }}
            - name: "{{ tpl $key $ }}"
              value: "{{ tpl (print $value) $ }}"
            {{- end }}
          {{- with .Values.ui.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ui.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
# devlake
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devlake.fullname" . }}-lake
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: lake
    {{- with .Values.lake.deployment.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.lake.replicaCount }}
  revisionHistoryLimit: {{ .Values.lake.revisionHistoryLimit }}
  {{- with .Values.lake.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "devlake.selectorLabels" . | nindent 6 }}
      devlakeComponent: lake
  template:
    metadata:
      labels:
        {{- include "devlake.selectorLabels" . | nindent 8 }}
        devlakeComponent: lake
        {{- with .Values.lake.extraLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        {{- toYaml .Values.lake.podAnnotations | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "devlake.serviceAccountName" . }}
      {{- with .Values.lake.securityContext }}
      securityContext:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "devlake.podAntiAffinity" (dict "enabled" .Values.lake.podAntiAffinity.enabled "type" .Values.lake.podAntiAffinity.type "componentName" "lake" "root" .) | nindent 6 }}
      {{- with .Values.lake.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.lake.initContainers }}
          {{- toYaml .Values.lake.initContainers | nindent 8 }}
        {{- end }}
        {{- include "common.initContainerWaitDatabase" . | nindent 8 }}
        {{- with .Values.lake.initContainerSecurityContext }}
          securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
      containers:
        - name: lake
          image: {{ include "devlake.lake.image" . }}
          imagePullPolicy: {{ .Values.lake.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.lake.port }}
          {{- with .Values.lake.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.lake.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "devlake.db.configmap" . }}
            - secretRef:
                name: {{ include "devlake.db.secret" . }}
            - secretRef:
                name: {{ include "devlake.lake.encryption.secret" . }}
            {{- if .Values.lake.extraEnvsFromSecret }}
            - secretRef:
                name: {{ .Values.lake.extraEnvsFromSecret }}
            {{- end }}
          env:
            - name: PORT
              value: "{{ .Values.lake.port }}"
            {{- if .Values.option.assembleDbUrl }}
            {{- if eq .Values.database.type "mysql" }}
            - name: DB_URL
              value: "mysql://$(MYSQL_USER):$(MYSQL_PASSWORD)@$(MYSQL_SERVER):$(MYSQL_PORT)/$(MYSQL_DATABASE)?charset=$(DB_CHARSET)&parseTime=$(DB_PARSE_TIME)&loc=$(DB_LOCATION){{ .Values.database.mysql.extraParams }}"
            {{- else if eq .Values.database.type "postgresql" }}
            - name: DB_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_SERVER):$(DB_PORT)/$(DB_DATABASE){{ .Values.database.postgresql.extraParams }}"
            {{- end }}
            {{- end }}
            {{- range $key1, $value1 := .Values.lake.envs }}
            - name: "{{ tpl $key1 $ }}"
              value: "{{ tpl (print $value1) $ }}"
            {{- end }}
            {{- range $key2, $value2 := .Values.commonEnvs }}
            - name: "{{ tpl $key2 $ }}"
              value: "{{ tpl (print $value2) $ }}"
            {{- end }}
          {{- with .Values.lake.resources }}
          resources:
          {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
            - name: cache
              mountPath: /.cache
            - name: shadow-azuredevops
              mountPath: /app/python/plugins/azuredevops
          {{- if .Values.lake.volumeMounts }}
            {{- range $volumeMount := .Values.lake.volumeMounts }}
            - {{- $volumeMount | toYaml | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.lake.containerSecurityContext }}
          securityContext:
          {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: shadow-azuredevops
          emptyDir: {}
      {{- if .Values.lake.volumes }}
        {{- range $volume := .Values.lake.volumes }}
        - {{- $volume | toYaml | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- with .Values.lake.nodeSelector }}
      nodeSelector:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.lake.affinity }}
      affinity:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.lake.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
