---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "devlake.fullname" . }}-postgresql-migration-fix
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "devlake.selectorLabels" . | nindent 8 }}
        devlakeComponent: migration-fixer
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "devlake.serviceAccountName" . }}
      containers:
      - name: postgresql-migration-fix
        image: postgres:15-alpine
        command:
          - sh
          - -c
          - |
            set -e
            echo "Waiting for PostgreSQL to be ready..."
            until pg_isready -h $DB_SERVER -p $DB_PORT -U $DB_USER; do
              echo "PostgreSQL not ready, waiting..."
              sleep 5
            done
            echo "PostgreSQL ready"

            echo "Waiting for DevLake to create base schema..."
            MAX_WAIT=300
            ELAPSED=0
            until psql "postgresql://$DB_USER:$DB_PASSWORD@$DB_SERVER:$DB_PORT/$DB_DATABASE" -c "SELECT 1 FROM _devlake_migration_history LIMIT 1" >/dev/null 2>&1; do
              if [ $ELAPSED -ge $MAX_WAIT ]; then
                echo "Timeout waiting for _devlake_migration_history table"
                exit 1
              fi
              echo "Base schema not ready, waiting... ($ELAPSED/$MAX_WAIT)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done
            echo "Base schema ready"

            echo "Applying PostgreSQL-compatible migrations..."

            # Migration 1: testmo scope_config_id (20250629000001)
            psql "postgresql://$DB_USER:$DB_PASSWORD@$DB_SERVER:$DB_PORT/$DB_DATABASE" <<'EOSQL'
            DO $$
            BEGIN
              IF NOT EXISTS (
                SELECT 1 FROM information_schema.columns
                WHERE table_name='_tool_testmo_projects' AND column_name='scope_config_id'
              ) THEN
                ALTER TABLE _tool_testmo_projects ADD COLUMN scope_config_id BIGINT NOT NULL DEFAULT 0;
                INSERT INTO _devlake_migration_history (created_at, script_version, script_name, comment)
                VALUES (NOW(), 20250629000001, 'Add scope_config_id to testmo projects', 'Applied via post-install Job for PostgreSQL compatibility');
                RAISE NOTICE 'Applied testmo migration 20250629000001';
              ELSE
                RAISE NOTICE 'Testmo migration already applied, skipping';
              END IF;
            END $$;
            EOSQL
            echo "✓ Testmo migration processed"

            # Migration 2: q_dev scope_config_id (20251123000001)
            psql "postgresql://$DB_USER:$DB_PASSWORD@$DB_SERVER:$DB_PORT/$DB_DATABASE" <<'EOSQL'
            DO $$
            BEGIN
              IF NOT EXISTS (
                SELECT 1 FROM information_schema.columns
                WHERE table_name='_tool_q_dev_s3_slices' AND column_name='scope_config_id'
              ) THEN
                ALTER TABLE _tool_q_dev_s3_slices ADD COLUMN scope_config_id BIGINT DEFAULT 0;
                INSERT INTO _devlake_migration_history (created_at, script_version, script_name, comment)
                VALUES (NOW(), 20251123000001, 'Add scope_config_id column to S3 slice table', 'Applied via post-install Job for PostgreSQL compatibility');
                RAISE NOTICE 'Applied q_dev migration 20251123000001';
              ELSE
                RAISE NOTICE 'Q_dev migration already applied, skipping';
              END IF;
            END $$;
            EOSQL
            echo "✓ Q_dev migration processed"

            # Migration 3: github jobs index (20240821000001)
            psql "postgresql://$DB_USER:$DB_PASSWORD@$DB_SERVER:$DB_PORT/$DB_DATABASE" <<'EOSQL'
            DO $$
            BEGIN
              IF NOT EXISTS (
                SELECT 1 FROM pg_indexes
                WHERE tablename='_tool_github_jobs' AND indexname='idx_repo_id_connection_id'
              ) THEN
                CREATE INDEX IF NOT EXISTS idx_repo_id_connection_id ON _tool_github_jobs (repo_id, connection_id);
                INSERT INTO _devlake_migration_history (created_at, script_version, script_name, comment)
                VALUES (NOW(), 20240821000001, 'add index to tool github jobs', 'Applied via post-install Job for PostgreSQL compatibility');
                RAISE NOTICE 'Applied github migration 20240821000001';
              ELSE
                RAISE NOTICE 'Github migration already applied, skipping';
              END IF;
            END $$;
            EOSQL
            echo "✓ Github migration processed"

            echo "PostgreSQL migration fix complete. DevLake should restart successfully now."
        envFrom:
          - configMapRef:
              name: {{ include "devlake.db.configmap" . }}
          - secretRef:
              name: {{ include "devlake.db.secret" . }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 70
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
{{- end }}
