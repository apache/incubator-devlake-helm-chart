# database services (v2.0.0: refactored for database.type selector)
---

{{- if not .Values.database.useExternal }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devlake.fullname" . }}-{{ .Values.database.type }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
    {{- with .Values.database.service.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
spec:
  type: {{ .Values.database.service.type }}
  {{- if and (eq .Values.database.service.type "LoadBalancer") .Values.database.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.database.service.loadBalancerIP }}
  {{- end }}
  selector:
    {{- include "devlake.selectorLabels" . | nindent 4 }}
    devlakeComponent: {{ .Values.database.type }}
  ports:
    - protocol: TCP
      name: {{ .Values.database.type }}
      port: {{ include "database.port" . }}
      targetPort: {{ include "database.port" . }}
      {{- if and (eq .Values.database.service.type "NodePort") .Values.database.service.nodePort }}
      nodePort: {{ .Values.database.service.nodePort }}
      {{- end }}
{{- end }}
# devlake services
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devlake.fullname" . }}-lake
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: lake
    devlakeComponent: lake
    {{- with .Values.lake.service.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
    {{- if .Values.metrics.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
    {{- end }}
spec:
  selector:
    {{- include "devlake.selectorLabels" . | nindent 4 }}
    devlakeComponent: lake
  ports:
    - protocol: TCP
      name: http
      port: {{ .Values.lake.port }}
      targetPort: {{ .Values.lake.port }}

---
# ui
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devlake.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
    devlakeComponent: ui
    {{- with .Values.ui.service.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
    {{- if .Values.metrics.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "4000"
    prometheus.io/path: "/metrics"
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "devlake.selectorLabels" . | nindent 4 }}
    devlakeComponent: ui
  ports:
    - protocol: TCP
      name: http
      port: 4000
      targetPort: 4000
