---
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "devlake.fullname" . }}-lake
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      devlakeComponent: lake
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              devlakeComponent: ui
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Database access
    - to:
        - podSelector:
            matchLabels:
              devlakeComponent: {{ if eq .Values.database.type "mysql" }}mysql{{ else }}postgresql{{ end }}
      ports:
        - protocol: TCP
          port: {{ if eq .Values.database.type "mysql" }}3306{{ else }}5432{{ end }}
    # DNS resolution (scoped to kube-dns pods in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- if .Values.networkPolicy.externalEgressCIDRs }}
    # External API access (e.g., GitHub, GitLab, Jira)
{{- range .Values.networkPolicy.externalEgressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- end }}
{{- end }}
