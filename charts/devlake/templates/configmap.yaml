---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devlake.db.configmap" . }}
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
data:
  # Database connection configuration (non-sensitive)
  # Note: Environment variable naming differs by database type:
  #   - MySQL: MYSQL_* prefix (standard MySQL client convention)
  #   - PostgreSQL: DB_* prefix (PostgreSQL client convention)
  # This follows each database's standard naming to avoid conflicts
{{- if eq .Values.database.type "mysql" }}
  MYSQL_USER: "{{ .Values.database.username }}"
  MYSQL_DATABASE: "{{ .Values.database.database }}"
  MYSQL_URL: "{{ include "database.server" . }}:{{ include "database.port" . }}"
  MYSQL_SERVER: "{{ include "database.server" . }}"
  MYSQL_PORT: "{{ include "database.port" . }}"
  DB_CHARSET: "utf8mb4"
  DB_PARSE_TIME: "True"
  DB_LOCATION: "{{ .Values.commonEnvs.TZ }}"
  DB_CUSTOM_PARAMS: "{{ .Values.database.mysql.extraParams }}"
{{- else if eq .Values.database.type "postgresql" }}
  DB_USER: "{{ .Values.database.username }}"
  DB_DATABASE: "{{ .Values.database.database }}"
  DB_URL: "{{ include "database.server" . }}:{{ include "database.port" . }}"
  DB_SERVER: "{{ include "database.server" . }}"
  DB_PORT: "{{ include "database.port" . }}"
  DB_CUSTOM_PARAMS: "{{ .Values.database.postgresql.extraParams }}"
{{- end }}
