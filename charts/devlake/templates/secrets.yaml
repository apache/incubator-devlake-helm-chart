{{- if not .Values.externalSecrets.enabled }}
{{- if .Values.option.autoCreateSecret }}
# ⚠️ SECURITY IMPLICATION: This Secret is created from plaintext values in values.yaml
# In production environments:
# 1. Use externalSecrets.enabled=true with External Secrets Operator, OR
# 2. Pre-create this Secret manually before install, OR
# 3. Use sealed-secrets or similar secret management solutions
# 4. Never commit values.yaml with populated passwords to version control
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devlake.db.secret" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
stringData:
{{- if eq .Values.database.type "mysql" }}
  MYSQL_PASSWORD: "{{ .Values.database.password }}"
  MYSQL_ROOT_PASSWORD: "{{ .Values.database.mysql.rootPassword }}"
{{- else if eq .Values.database.type "postgresql" }}
  DB_PASSWORD: "{{ .Values.database.password }}"
{{- end }}
{{- end }}

{{- if and .Values.ui.basicAuth.enabled .Values.ui.basicAuth.autoCreateSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devlake.ui.auth.secret" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
stringData:
  ADMIN_USER: "{{ .Values.ui.basicAuth.user }}"
  ADMIN_PASS: "{{ .Values.ui.basicAuth.password }}"
{{- end }}

{{- if .Values.lake.encryptionSecret.autoCreateSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devlake.lake.encryption.secret" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    {{- include "devlake.annotations" . | nindent 4 }}
stringData:
  ENCRYPTION_SECRET: {{ .Values.lake.encryptionSecret.secret }}
{{- end }}
{{- end }}
